<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FLUX UI — 起動中</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#070707;
      --accent:#bef264;
      --accent-glow:rgba(190,242,100,.35);
      --text:rgba(255,255,255,.85);
      --text2:rgba(255,255,255,.4);
      --text3:rgba(255,255,255,.18);
    }

    html,body{
      width:100%;height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'Outfit',sans-serif;
      overflow:hidden;
      user-select:none;
    }

    .bg-bloom{
      position:fixed;top:50%;left:50%;
      width:700px;height:700px;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(190,242,100,.055) 0%,transparent 68%);
      pointer-events:none;
      animation:bloom 5s ease-in-out infinite;
    }
    @keyframes bloom{
      0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}
      50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
    }

    .bg-dots{
      position:fixed;inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);
      background-size:32px 32px;
      pointer-events:none;
      mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 0%,transparent 100%);
    }

    .stage{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      display:flex;flex-direction:column;
      align-items:center;gap:2.8rem;
    }

    .orbital{
      position:relative;
      width:220px;height:220px;
    }
    .orbital svg{ width:100%;height:100%;overflow:visible; }

    .r1{animation:spin 10s linear infinite;transform-origin:50% 50%}
    .r2{animation:spin 6.5s linear infinite reverse;transform-origin:50% 50%}
    .r3{animation:spin 16s linear infinite;transform-origin:50% 50%}

    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    .logo-wrap{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
    }
    .logo{
      font-size:2.6rem;font-weight:900;
      letter-spacing:-.05em;line-height:1;
      color:#fff;
    }
    .logo .dot{
      color:var(--accent);
      text-shadow:0 0 20px var(--accent-glow);
    }

    /* Indeterminate scanning bar */
    .prog-wrap{ width:260px; display:flex;flex-direction:column;gap:.75rem; }
    .prog-track{
      width:100%;height:2px;
      background:rgba(255,255,255,.07);
      border-radius:99px;
      overflow:hidden;
      position:relative;
    }
    .prog-scan{
      position:absolute;
      height:100%;width:40%;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
      border-radius:99px;
      box-shadow:0 0 14px var(--accent-glow);
      animation:scan 2s ease-in-out infinite;
    }
    @keyframes scan{
      0%  { left:-40%; }
      100%{ left:140%; }
    }

    .status-block{
      text-align:center;
      display:flex;flex-direction:column;
      align-items:center;gap:.4rem;
    }
    .status{
      font-size:.73rem;font-weight:400;
      letter-spacing:.14em;color:var(--text2);
      text-transform:uppercase;
      display:flex;align-items:center;gap:.5rem;
    }
    .dots-wrap{ display:inline-flex;gap:.22rem;align-items:center; }
    .d{
      width:3px;height:3px;border-radius:50%;
      background:var(--accent);opacity:.3;
      animation:blink 1.4s ease-in-out infinite;
    }
    .d:nth-child(2){animation-delay:.2s}
    .d:nth-child(3){animation-delay:.4s}
    @keyframes blink{
      0%,80%,100%{opacity:.2;transform:scale(.7)}
      40%{opacity:1;transform:scale(1)}
    }
    .sub{ font-size:.65rem;color:var(--text3);letter-spacing:.06em; }

    /* Ready state */
    .stage.ready .status{ color:var(--accent); }
    .stage.ready .d{ background:var(--accent);opacity:1;animation:none; }

    body.bye{ animation:fadeOut .45s ease forwards; }
    @keyframes fadeOut{ to{opacity:0;filter:blur(8px)} }

    .corner{
      position:fixed;bottom:1.5rem;left:1.5rem;
      font-size:.6rem;letter-spacing:.1em;
      color:var(--text3);text-transform:uppercase;
    }
  </style>
</head>
<body>

<div class="bg-bloom"></div>
<div class="bg-dots"></div>

<div class="stage" id="stage">

  <div class="orbital">
    <svg viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="r1" cx="110" cy="110" r="102"
        stroke="rgba(190,242,100,.13)" stroke-width="1" stroke-dasharray="7 7"/>
      <circle class="r1" cx="212" cy="110" r="3.5"
        fill="rgba(190,242,100,.7)" filter="url(#glow)"/>
      <circle class="r2" cx="110" cy="110" r="80"
        stroke="rgba(190,242,100,.2)" stroke-width="1" stroke-dasharray="3 11"/>
      <circle class="r2" cx="190" cy="110" r="2.5" fill="rgba(190,242,100,.5)"/>
      <circle class="r2" cx="30"  cy="110" r="2"   fill="rgba(190,242,100,.3)"/>
      <circle class="r3" cx="110" cy="110" r="57"
        stroke="rgba(255,255,255,.06)" stroke-width="1" stroke-dasharray="2 9"/>
      <defs>
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
    <div class="logo-wrap">
      <div class="logo">FLUX<span class="dot">.</span></div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-track">
      <div class="prog-scan"></div>
    </div>
    <div class="status-block">
      <div class="status" id="status">
        <span id="statusText">起動準備中</span>
        <span class="dots-wrap" id="dotsWrap">
          <span class="d"></span><span class="d"></span><span class="d"></span>
        </span>
      </div>
      <div class="sub" id="sub">バックグラウンドでサーバーを起動しています</div>
    </div>
  </div>

</div>

<div class="corner">FLUX UI</div>

<script>
  const params   = new URLSearchParams(location.search);
  const port     = params.get('port') || '5000';
  const base     = 'http://localhost:' + port;

  const stageEl  = document.getElementById('stage');
  const statusEl = document.getElementById('statusText');
  const subEl    = document.getElementById('sub');
  const dotsEl   = document.getElementById('dotsWrap');

  let elapsed = 0;
  setInterval(() => {
    elapsed++;
    const subs = [
      'バックグラウンドでサーバーを起動しています',
      'カスタムノードを確認しています...',
      'ComfyUI を起動しています...',
      'もう少しお待ちください...',
    ];
    subEl.textContent = subs[Math.min(Math.floor(elapsed / 15), subs.length - 1)];
  }, 1000);

  function doRedirect() {
    stageEl.classList.add('ready');
    statusEl.textContent = 'サーバー起動完了';
    dotsEl.style.display = 'none';
    subEl.textContent    = 'FLUX UI へ移動します...';
    setTimeout(() => {
      document.body.classList.add('bye');
      setTimeout(() => { window.location.href = base + '/loading'; }, 450);
    }, 600);
  }

  function poll() {
    const img = new Image();
    img.onload  = doRedirect;
    img.onerror = () => setTimeout(poll, 700);
    img.src = base + '/api/ping.png?' + Date.now();
  }

  poll();
</script>
</body>
</html>
